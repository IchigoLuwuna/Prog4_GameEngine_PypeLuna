name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Make build directory
      run: |
        mkdir build
        cd build
        ls
      
    - name: Configure CMake
      run: cmake ..

    - name: Make
      run: make
